<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상세페이지 통이미지 압축 툴 v4</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 30px; background-color: #f9f9f9; color: #333; max-width: 800px; margin: 0 auto; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { color: #5e17eb; margin-top: 0; }
        .upload-box { border: 2px dashed #5e17eb; padding: 40px 20px; text-align: center; border-radius: 8px; cursor: pointer; background: #f4f0ff; transition: 0.3s; font-weight: bold; font-size: 16px; }
        .upload-box:hover { background: #eae2ff; }
        input[type="file"] { display: none; }
        .status { margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 6px; font-size: 15px; }
        .status.processing { background-color: #e3f2fd; color: #0d47a1; border-left: 5px solid #2196f3; }
        .status.success { background-color: #e8f5e9; color: #1b5e20; border-left: 5px solid #4caf50; }
        .status.error { background-color: #ffebee; color: #c62828; border-left: 5px solid #f44336; }
        .result-info { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 6px; display: none; font-size: 14px; line-height: 1.6; }
        .result-info b { color: #5e17eb; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ 초대형 통이미지 전용 압축 추출 툴</h2>
    <p>설정 기준: 너비 <b>1280px 고정</b> | 용량 <b>4000KB 이내</b> | 브라우저 제한 해제 및 강제 다운로드</p>
    
    <div class="upload-box" onclick="document.getElementById('imageInput').click()">
        📂 클릭하여 실험용 이미지 업로드 (1장 강제 추출)
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div id="status" class="status" style="display:none;"></div>

    <div id="resultInfo" class="result-info">
        🎯 <b>최종 추출 결과 안내</b><br>
        - 변환 해상도: <span id="resDim">-</span><br>
        - 변환 용량: <span id="resSize">-</span> (품질 약 <span id="resQual">-</span>% 적용)
    </div>
</div>

<script>
const imageInput = document.getElementById('imageInput');
const statusDiv = document.getElementById('status');
const resultInfo = document.getElementById('resultInfo');

const MAX_TARGET_SIZE = 4000 * 1024; // 4000KB
const TARGET_WIDTH = 1280;

imageInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    updateStatus("processing", "⌛ 1단계: 초장문 파일 분석 및 가상 메모리 로드 중...");
    resultInfo.style.display = "none";

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;
        img.onload = function() {
            updateStatus("processing", "⌛ 2단계: 안전 규격 하이브리드 캔버스 생성 중...");

            setTimeout(() => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // 가로 너비 1280px 비율 계산
                canvas.width = TARGET_WIDTH;
                canvas.height = Math.floor(img.height * (TARGET_WIDTH / img.width));

                try {
                    // 흰색 배경 기본 깔기
                    ctx.fillStyle = "#fff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // 메모리 다운 방지를 위한 저수준 드로잉 연산
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                } catch (err) {
                    updateStatus("error", "❌ 브라우저 렌더링 한계를 넘어섰습니다. 이미지를 약간만 줄이거나 다른 브라우저를 이용해주세요.");
                    return;
                }

                // 압축 단계
                let minQ = 0.01;
                let maxQ = 0.95;
                let bestBlob = null;
                let bestQuality = 0.85;
                let step = 0;
                const maxSteps = 5; // 속도 향상을 위해 서치 스텝 최적화

                updateStatus("processing", "⚡ 3단계: 용량 최적화 분석 및 파일 빌드 중...");

                function runBinarySearch() {
                    let midQ = (minQ + maxQ) / 2;

                    if (step >= maxSteps) {
                        // 결과가 있든 없든 무조건 강제로 1장 출력 진행
                        if (bestBlob) {
                            triggerDownload(bestBlob, bestQuality, canvas);
                        } else {
                            canvas.toBlob(function(fallbackBlob) {
                                triggerDownload(fallbackBlob, minQ, canvas);
                            }, 'image/jpeg', minQ);
                        }
                        return;
                    }

                    step++;

                    canvas.toBlob(function(blob) {
                        if (!blob) {
                            maxQ = midQ;
                        } else if (blob.size <= MAX_TARGET_SIZE) {
                            bestBlob = blob;
                            bestQuality = midQ;
                            minQ = midQ; 
                        } else {
                            maxQ = midQ; 
                        }
                        // 가비지 컬렉션을 완벽하게 보장하기 위해 대기 시간 부여
                        setTimeout(runBinarySearch, 50);
                    }, 'image/jpeg', midQ);
                }

                runBinarySearch();
            }, 100);
        };
    };
});

function updateStatus(type, msg) {
    statusDiv.style.display = "block";
    statusDiv.className = `status ${type}`;
    statusDiv.textContent = msg;
}

function triggerDownload(blob, quality, canvas) {
    if (!blob) {
        updateStatus("error", "❌ 추출 파일을 생성하지 못했습니다. 원본 세로 길이가 브라우저 한도를 초과했습니다.");
        return;
    }

    updateStatus("success", "🎉 최적화 압축 완료! 즉시 1장 통이미지 다운로드를 시작합니다.");

    const blobUrl = URL.createObjectURL(blob);

    // 결과 텍스트 바인딩
    document.getElementById('resDim').textContent = `${canvas.width}px x ${canvas.height}px`;
    document.getElementById('resSize').textContent = `${(blob.size / 1024).toFixed(2)} KB`;
    document.getElementById('resQual').textContent = `${Math.round(quality * 100)}`;
    resultInfo.style.display = "block";

    // 다운로드 트리거 링크 강제 클릭
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = `ready_1280_pass.jpg`;
    document.body.appendChild(a);
    a.click();
    
    // 청소 및 메모리 누수 방지
    setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
    }, 200);
}
</script>

</body>
</html>
