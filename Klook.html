<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상세페이지 통이미지 압축 툴 v3</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 30px; background-color: #f9f9f9; color: #333; max-width: 800px; margin: 0 auto; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { color: #5e17eb; margin-top: 0; }
        .upload-box { border: 2px dashed #5e17eb; padding: 40px 20px; text-align: center; border-radius: 8px; cursor: pointer; background: #f4f0ff; transition: 0.3s; font-weight: bold; font-size: 16px; }
        .upload-box:hover { background: #eae2ff; }
        input[type="file"] { display: none; }
        .status { margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 6px; font-size: 15px; }
        .status.processing { background-color: #e3f2fd; color: #0d47a1; border-left: 5px solid #2196f3; }
        .status.success { background-color: #e8f5e9; color: #1b5e20; border-left: 5px solid #4caf50; }
        .status.error { background-color: #ffebee; color: #c62828; border-left: 5px solid #f44336; }
        .result-info { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 6px; display: none; font-size: 14px; line-height: 1.6; }
        .result-info b { color: #5e17eb; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ 통이미지 고속 압축 및 자동 추출 툴</h2>
    <p>설정 기준: 너비 <b>1280px 고정</b> | 용량 <b>4000KB 이내</b> | 완료 즉시 자동 다운로드</p>
    
    <div class="upload-box" onclick="document.getElementById('imageInput').click()">
        📂 클릭하여 이미지 업로드 (최종본 1장 자동 추출)
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div id="status" class="status" style="display:none;"></div>

    <div id="resultInfo" class="result-info">
        🎯 <b>변환 결과 안내</b><br>
        - 최종 해상도: <span id="resDim">-</span><br>
        - 최종 용량: <span id="resSize">-</span> (품질 <span id="resQual">-</span> 적용 완료)
    </div>
</div>

<script>
const imageInput = document.getElementById('imageInput');
const statusDiv = document.getElementById('status');
const resultInfo = document.getElementById('resultInfo');

const MAX_TARGET_SIZE = 4000 * 1024; // 4000KB
const TARGET_WIDTH = 1280;

imageInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    // 초기화
    updateStatus("processing", "⌛ 1단계: 대용량 이미지 파일을 불러오고 있습니다...");
    resultInfo.style.display = "none";

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;
        img.onload = function() {
            updateStatus("processing", "⌛ 2단계: 너비 1280px로 리사이징 캔버스 생성 중...");

            setTimeout(() => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                canvas.width = TARGET_WIDTH;
                canvas.height = Math.floor(img.height * (TARGET_WIDTH / img.width));

                try {
                    ctx.fillStyle = "#fff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                } catch (err) {
                    updateStatus("error", "❌ 브라우저의 픽셀 제한 범위를 초과한 이미지입니다.");
                    return;
                }

                // 이진 탐색 압축 루프
                let minQ = 0.01, maxQ = 0.99;
                let bestBlob = null;
                let bestQuality = 0.9;
                let step = 0;
                const maxSteps = 7; 

                updateStatus("processing", "⚡ 3단계: 4000KB 이하 최적 품질 계산 중 (0/7)...");

                function runBinarySearch() {
                    if (step >= maxSteps) {
                        if (bestBlob) {
                            triggerDownload(bestBlob, bestQuality, canvas);
                        } else {
                            // 최하 품질로도 실패 시 강제 추출
                            canvas.toBlob(function(fallbackBlob) {
                                triggerDownload(fallbackBlob, 0.01, canvas);
                            }, 'image/jpeg', 0.01);
                        }
                        return;
                    }

                    step++;
                    updateStatus("processing", `⚡ 3단계: 최적화 압축률 분석 중 (${step}/${maxSteps})...`);

                    canvas.toBlob(function(blob) {
                        if (!blob) {
                            maxQ = midQ;
                        } else if (blob.size <= MAX_TARGET_SIZE) {
                            bestBlob = blob;
                            bestQuality = midQ;
                            minQ = midQ; 
                        } else {
                            maxQ = midQ; 
                        }
                        setTimeout(runBinarySearch, 30);
                    }, 'image/jpeg', (minQ + maxQ) / 2);
                    
                    let midQ = (minQ + maxQ) / 2;
                }

                runBinarySearch();
            }, 50);
        };
    };
});

function updateStatus(type, msg) {
    statusDiv.style.display = "block";
    statusDiv.className = `status ${type}`;
    statusDiv.textContent = msg;
}

function triggerDownload(blob, quality, canvas) {
    updateStatus("success", "🎉 최적화 압축 완료! 즉시 다운로드를 시작합니다.");

    const blobUrl = URL.createObjectURL(blob);

    // 결과 정보 표시
    document.getElementById('resDim').textContent = `${canvas.width}px x ${canvas.height}px`;
    document.getElementById('resSize').textContent = `${(blob.size / 1024).toFixed(2)} KB`;
    document.getElementById('resQual').textContent = `${Math.round(quality * 100)}%`;
    resultInfo.style.display = "block";

    // 스크립트로 다운로드 강제 트리거
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = `optimized_1280_${Date.now()}.jpg`;
    document.body.appendChild(a);
    a.click();
    
    // 메모리 해제
    setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
    }, 100);
}
</script>

</body>
</html>
