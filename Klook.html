<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상세페이지 통이미지 압축 툴 v5</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 30px; background-color: #f9f9f9; color: #333; max-width: 800px; margin: 0 auto; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { color: #5e17eb; margin-top: 0; }
        .upload-box { border: 2px dashed #5e17eb; padding: 40px 20px; text-align: center; border-radius: 8px; cursor: pointer; background: #f4f0ff; transition: 0.3s; font-weight: bold; font-size: 16px; }
        .upload-box:hover { background: #eae2ff; }
        input[type="file"] { display: none; }
        .status { margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 6px; font-size: 15px; }
        .status.processing { background-color: #e3f2fd; color: #0d47a1; border-left: 5px solid #2196f3; }
        .status.success { background-color: #e8f5e9; color: #1b5e20; border-left: 5px solid #4caf50; }
        .status.error { background-color: #ffebee; color: #c62828; border-left: 5px solid #f44336; }
        .result-info { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 6px; display: none; font-size: 14px; line-height: 1.6; }
        .result-info b { color: #5e17eb; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ 초대형 통이미지 전용 압축 추출 툴 (엔진 전면 개조)</h2>
    <p>설정 기준: 너비 <b>1280px 고정</b> | 용량 <b>4000KB 이내</b> | 무조건 1장 자동 다운로드</p>
    
    <div class="upload-box" onclick="document.getElementById('imageInput').click()">
        📂 클릭하여 이미지 업로드 (초장문 1장 강제 추출)
        <input type="file" id="imageInput" accept="image/*">
    </div>

    <div id="status" class="status" style="display:none;"></div>

    <div id="resultInfo" class="result-info">
        🎯 <b>최종 추출 결과 안내</b><br>
        - 변환 해상도: <span id="resDim">-</span><br>
        - 변환 용량: <span id="resSize">-</span> (품질 약 <span id="resQual">-</span>% 적용)
    </div>
</div>

<script>
const imageInput = document.getElementById('imageInput');
const statusDiv = document.getElementById('status');
const resultInfo = document.getElementById('resultInfo');

const MAX_TARGET_SIZE = 4000 * 1024; // 4000KB
const TARGET_WIDTH = 1280;
const CHUNK_HEIGHT = 8000; // 브라우저가 안전하게 처리할 수 있는 조각 높이 단위

imageInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    updateStatus("processing", "⌛ 1단계: 대용량 이미지 가상 버퍼 로딩 중...");
    resultInfo.style.display = "none";

    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;
        img.onload = function() {
            updateStatus("processing", "⌛ 2단계: 초장문 장벽 해제 및 분할 리사이징 연산 중...");

            setTimeout(() => {
                const scale = TARGET_WIDTH / img.width;
                const finalWidth = TARGET_WIDTH;
                const finalHeight = Math.floor(img.height * scale);

                // 최종 합본을 담을 메인 도화지 생성
                const mainCanvas = document.createElement('canvas');
                mainCanvas.width = finalWidth;
                mainCanvas.height = finalHeight;
                const mainCtx = mainCanvas.getContext('2d');
                mainCtx.fillStyle = "#fff";
                mainCtx.fillRect(0, 0, finalWidth, finalHeight);

                // 원본을 쪼개서 리사이징 후 합본 캔버스에 이어붙이기
                try {
                    let sourceY = 0;
                    while (sourceY < img.height) {
                        let currentChunkHeight = Math.min(CHUNK_HEIGHT, img.height - sourceY);
                        
                        // 임시 조각 도화지
                        const chunkCanvas = document.createElement('canvas');
                        chunkCanvas.width = img.width;
                        chunkCanvas.height = currentChunkHeight;
                        const chunkCtx = chunkCanvas.getContext('2d');
                        
                        // 원본 조각 잘라내기
                        chunkCtx.drawImage(img, 0, sourceY, img.width, currentChunkHeight, 0, 0, img.width, currentChunkHeight);
                        
                        // 메인 도화지에 스케일 다운하여 이어붙이기
                        mainCtx.drawImage(chunkCanvas, 0, 0, img.width, currentChunkHeight, 0, Math.floor(sourceY * scale), finalWidth, Math.floor(currentChunkHeight * scale));
                        
                        sourceY += currentChunkHeight;
                    }
                } catch (err) {
                    updateStatus("error", "❌ 이미지 분할 렌더링 중 오류가 발생했습니다.");
                    return;
                }

                // 3단계: 이진 탐색 압축 루프 시작
                let minQ = 0.01;
                let maxQ = 0.95;
                let bestBlob = null;
                let bestQuality = 0.85;
                let step = 0;
                const maxSteps = 5;

                updateStatus("processing", "⚡ 3단계: 4000KB 맞춤 최적화 알고리즘 가동 중...");

                function runBinarySearch() {
                    let midQ = (minQ + maxQ) / 2;

                    if (step >= maxSteps) {
                        if (bestBlob) {
                            triggerDownload(bestBlob, bestQuality, mainCanvas);
                        } else {
                            mainCanvas.toBlob(function(fallbackBlob) {
                                triggerDownload(fallbackBlob, minQ, mainCanvas);
                            }, 'image/jpeg', minQ);
                        }
                        return;
                    }

                    step++;

                    mainCanvas.toBlob(function(blob) {
                        if (!blob) {
                            maxQ = midQ;
                        } else if (blob.size <= MAX_TARGET_SIZE) {
                            bestBlob = blob;
                            bestQuality = midQ;
                            minQ = midQ; 
                        } else {
                            maxQ = midQ; 
                        }
                        setTimeout(runBinarySearch, 40);
                    }, 'image/jpeg', midQ);
                }

                runBinarySearch();
            }, 100);
        };
    };
});

function updateStatus(type, msg) {
    statusDiv.style.display = "block";
    statusDiv.className = `status ${type}`;
    statusDiv.textContent = msg;
}

function triggerDownload(blob, quality, canvas) {
    if (!blob) {
        updateStatus("error", "❌ 최종 이미지 빌드 실패. 다른 브라우저에서 시도해 주세요.");
        return;
    }

    updateStatus("success", "🎉 브라우저 한계 돌파 성공! 1장 통압축 다운로드를 시작합니다.");

    const blobUrl = URL.createObjectURL(blob);

    document.getElementById('resDim').textContent = `${canvas.width}px x ${canvas.height}px`;
    document.getElementById('resSize').textContent = `${(blob.size / 1024).toFixed(2)} KB`;
    document.getElementById('resQual').textContent = `${Math.round(quality * 100)}`;
    resultInfo.style.display = "block";

    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = `optimized_1280_pass.jpg`;
    document.body.appendChild(a);
    a.click();
    
    setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
    }, 200);
}
</script>

</body>
</html>
